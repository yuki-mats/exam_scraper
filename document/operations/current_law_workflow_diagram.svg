<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1500" viewBox="0 0 1200 1500" role="img" aria-labelledby="title desc">
  <title id="title">法令問題整備ワークフローの現状図解</title>
  <desc id="desc">法令問題の整備で、監査証跡、中間ファイル、21_explanationText_added、30_merged_2、40_convert、upload_to_firestore がどうつながるかを縦型に示す図。</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 7 L 0 14 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 7 L 0 14 z" fill="#15803d"/>
    </marker>
    <marker id="arrow-amber" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 7 L 0 14 z" fill="#b45309"/>
    </marker>
    <marker id="arrow-gray" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 7 L 0 14 z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #e2e8f0; stroke-width: 2; }
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; fill: #0f172a; }
      .subtitle { font: 500 18px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; fill: #475569; }
      .lane { font: 700 18px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; fill: #0f172a; }
      .box-title { font: 700 22px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; fill: #111827; }
      .box-text { font: 500 16px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; fill: #334155; }
      .box-small { font: 500 14px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; fill: #475569; }
      .pill { font: 700 15px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; fill: #ffffff; }
      .note-title { font: 700 20px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; fill: #0f172a; }
      .note-text { font: 500 16px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; fill: #334155; }
      .flow { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .flow-thin { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 8 8; }
      .shadow { filter: drop-shadow(0 10px 18px rgba(15, 23, 42, 0.10)); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="1500"/>

  <text class="title" x="70" y="62">法令問題整備ワークフローの現状</text>
  <text class="subtitle" x="70" y="96">監査ファイルは証跡。アプリに載せる内容は 21_explanationText_added に統合する。</text>
  <text class="subtitle" x="70" y="123">その後、30_merged_2 → 40_convert → upload_to_firestore へ流す。</text>

  <rect class="panel" x="50" y="160" width="1100" height="1190" rx="18"/>

  <text class="lane" x="120" y="210">公開用データの流れ</text>
  <text class="lane" x="770" y="210">監査・根拠の流れ</text>

  <rect class="shadow" x="120" y="240" width="430" height="110" rx="14" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
  <text class="box-title" x="150" y="278">00_source</text>
  <text class="box-text" x="150" y="308">スクレイピング結果</text>
  <text class="box-small" x="150" y="332">問題文・選択肢・元解説。原則ここは直接編集しない。</text>

  <line class="flow" x1="335" y1="350" x2="335" y2="415" stroke="#2563eb" marker-end="url(#arrow-blue)"/>

  <rect class="shadow" x="120" y="420" width="430" height="118" rx="14" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
  <text class="box-title" x="150" y="458">20_merged_1</text>
  <text class="box-text" x="150" y="488">03 の主入力</text>
  <text class="box-small" x="150" y="514">questionType / questionIntent / correctChoiceText 下書き</text>

  <rect class="shadow" x="720" y="285" width="330" height="118" rx="14" fill="#ecfdf5" stroke="#bbf7d0" stroke-width="2"/>
  <text class="box-title" x="750" y="323">18_law_context_prepared</text>
  <text class="box-text" x="750" y="353">03 前の法令コンテキスト</text>
  <text class="box-small" x="750" y="379">isLawRelated / lawReferences 候補</text>

  <path class="flow" d="M 720 344 C 650 344, 620 478, 550 478" stroke="#15803d" marker-end="url(#arrow-green)"/>
  <text class="box-small" x="625" y="450">mergeして 20 に入る</text>

  <rect class="shadow" x="720" y="455" width="330" height="150" rx="14" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
  <text class="box-title" x="750" y="493">03b sidecar / ledger</text>
  <text class="box-text" x="750" y="523">一次・二次・三次監査の証跡</text>
  <text class="box-small" x="750" y="549">evidence bundle / auditStatus / reviewState</text>
  <text class="box-small" x="750" y="575">updated_to_current_law は三次確定後だけ公開へ反映</text>

  <line class="flow-thin" x1="885" y1="403" x2="885" y2="455" stroke="#b45309" marker-end="url(#arrow-amber)"/>

  <line class="flow" x1="335" y1="538" x2="335" y2="655" stroke="#2563eb" marker-end="url(#arrow-blue)"/>

  <rect class="shadow" x="120" y="660" width="565" height="230" rx="16" fill="#fefce8" stroke="#fde68a" stroke-width="3"/>
  <text class="box-title" x="150" y="703">21_explanationText_added</text>
  <text class="box-text" x="150" y="736">公開用に載せたい内容をここへ統合</text>

  <rect x="150" y="760" width="350" height="34" rx="17" fill="#111827"/>
  <text class="pill" x="172" y="782">explanationText</text>

  <rect x="150" y="806" width="350" height="34" rx="17" fill="#2563eb"/>
  <text class="pill" x="172" y="828">suggestedQuestions = 想定質問チップ</text>

  <rect x="150" y="852" width="410" height="34" rx="17" fill="#15803d"/>
  <text class="pill" x="172" y="874">suggestedQuestionDetails = チップ押下後の保存済み回答</text>

  <path class="flow" d="M 720 530 C 650 530, 725 775, 685 775" stroke="#b45309" marker-end="url(#arrow-amber)"/>
  <text class="box-small" x="710" y="708">監査結果を反映</text>

  <rect class="shadow" x="720" y="680" width="330" height="120" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text class="box-title" x="750" y="718">必要に応じて一緒に入る</text>
  <text class="box-small" x="750" y="750">lawReferences / lawRevisionFacts</text>
  <text class="box-small" x="750" y="775">isLawRelated / lawGroundedExplanationNotNeeded</text>

  <rect x="720" y="825" width="330" height="86" rx="14" fill="#fffbeb" stroke="#fcd34d" stroke-width="2"/>
  <text class="box-small" x="750" y="858">sidecar は「判断の証跡」</text>
  <text class="box-small" x="750" y="884">そのまま upload する本体ではない</text>

  <line class="flow" x1="402" y1="890" x2="402" y2="965" stroke="#2563eb" marker-end="url(#arrow-blue)"/>

  <rect class="shadow" x="220" y="970" width="365" height="86" rx="14" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text class="box-title" x="250" y="1007">30_merged_2</text>
  <text class="box-small" x="250" y="1035">explanation / questionSetId / correctChoiceText を反映</text>

  <line class="flow" x1="402" y1="1056" x2="402" y2="1125" stroke="#2563eb" marker-end="url(#arrow-blue)"/>

  <rect class="shadow" x="220" y="1130" width="365" height="86" rx="14" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text class="box-title" x="250" y="1167">40_convert</text>
  <text class="box-small" x="250" y="1195">Firestore schema 向け変換結果</text>

  <line class="flow" x1="402" y1="1216" x2="402" y2="1285" stroke="#2563eb" marker-end="url(#arrow-blue)"/>

  <rect class="shadow" x="220" y="1290" width="365" height="86" rx="14" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text class="box-title" x="250" y="1327">upload_to_firestore</text>
  <text class="box-small" x="250" y="1355">本番投入用 JSON</text>

  <rect x="670" y="1010" width="380" height="150" rx="16" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2"/>
  <text class="note-title" x="700" y="1048">認識合わせポイント</text>
  <text class="note-text" x="700" y="1080">21 は「公開用フィールドの統合ポイント」。</text>
  <text class="note-text" x="700" y="1110">最終的にアプリへ入るのは、</text>
  <text class="note-text" x="700" y="1140">30 → 40 → upload を通ったデータ。</text>

  <text class="box-small" x="70" y="1440">保存先: document/operations/current_law_workflow_diagram.svg</text>
</svg>
