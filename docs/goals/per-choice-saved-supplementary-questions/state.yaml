      architecture_decision:
        - "update targetはstage内で一意のid・表示名・重複しないfields・任意のreadFieldsを持ち、API識別子はstageId.targetIdとする。"
        - "既存実行はupdateTargetIds省略で全targetを選択し、従来の書込可能field集合を維持する。"
