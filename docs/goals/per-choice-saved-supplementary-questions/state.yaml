version: 2

goal:
  title: "選択肢別・保存済み補足質問"
  slug: "per-choice-saved-supplementary-questions"
  kind: specific
  tranche: "follow-up: listGroupId一覧を問題整備・洗い替えの統一入口にし、2017年の補足質問のみをUI実行して監視する"
  status: active
  oracle:
    signal: "代表問題の各isChoiceOnly=false documentに選択肢専用の最大3件の保存回答が入り、チップ押下時のVertex AI requestが0件になる"
    cadence: "after each Worker package and at final audit"
    final_proof: "両repoの契約テスト、Firestore変換fixture readback、repaso widget test、今回変更だけのcommit/push"
  intake:
    original_request: "AIが基本解説後の疑問を選択肢ごとに最大3件予測し、回答付き更新patchとして事前保存する仕組みをexam_scraperとrepasoに整備したい"
    interpreted_outcome: "補足質問を元問題単位のflat配列から選択肢単位の保存済みquestion/answerへ改め、公開変換とアプリ表示で生成AI不要を保証する"
    input_shape: specific
    audience: "暗記プラスの受験者と問題整備の運用者"
    authority: requested
    proof_type: test
    completion_proof: "選択肢別最大3件、isChoiceOnly gating、質問回答対応、チップAPI非呼出し、自由入力API維持を自動テストで証明する"
    likely_misfire: "flat配列を3件へ切るだけで、他選択肢への複製とAI fallbackを残す"
    blind_spots_considered:
      - "旧patch schemaとの互換と移行判定"
      - "suggestedQuestionsとsuggestedQuestionDetailsの二重正本"
      - "questionType別のisChoiceOnly判定"
      - "法令問題の追加疑問による上限超過"
      - "両repoの既存dirty差分"
    existing_plan_facts:
      - "基本解説で完結する"
      - "基本解説を踏まえたユーザーの追加疑問を選択肢ごとに最大3件用意する"
      - "質問と回答を更新用patchへ事前保存する"
      - "チップ押下は保存回答を表示し生成AI APIを呼ばない"
      - "自由入力だけ生成AI APIを使用する"

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  exact_human_approval_can_terminal_wait: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/per-choice-saved-supplementary-questions/"
    command: "node /Users/yuki/.codex/plugins/cache/goalbuddy/goalbuddy/0.4.1/skills/goal-prep/surfaces/local-goal-board/scripts/local-goal-board.mjs --goal /Users/yuki/development/exam_scraper/docs/goals/per-choice-saved-supplementary-questions"

