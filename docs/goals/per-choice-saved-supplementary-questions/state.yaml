        - "candidate generation, patch saving, merge/minimal materialization, readiness/schema validation, conversion, review UI, repaso display"
        - "existing non-split publication behavior is not heuristically remapped in this tranche"
      worker_objective: "Implement one vertical slice across exam_scraper and repaso: generate and validate per-choice saved supplementary Q&A, save it as the only patch authority, project only matching non-choice-only documents at Firestore conversion, make review UI legible, and ensure repaso chips never call Vertex AI while free input still does."
