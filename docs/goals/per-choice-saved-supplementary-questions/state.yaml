      architecture_decision:
        - "patch and merged SSOT: suggestedQuestionDetailsByChoice = [{choiceIndex, items:[{question, answer}]}]"
        - "choiceIndex is zero-based and unique; items are non-empty, unique by question, and at most 3; missing entry means 0"
        - "suggestedQuestions is derived output only, never an authored patch SSOT"
        - "split conversion resolves public choices deterministically from questionType/correct and only projects the matching entry into isChoiceOnly=false docs"
