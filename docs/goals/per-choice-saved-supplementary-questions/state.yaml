        - "preview tokenはrange・target・selected fieldsを含むplan全体をhashし、startで再計算する。再開も同じrange・targetだけを許可する。"
        - "candidate parserとallowedFieldsをfield書込境界とし、選択外fieldをset/unsetした候補は問題単位で拒否する。"
        - "work_versions v3はstage配下にtarget別記録を持てる。部分実行は選択targetだけを更新し、全target実行は従来どおりstage全体を記録する。stage状態は全targetの集約とする。"
