    original_request: "ガス主任技術者試験の法令問題について、一問ずつ棚卸しして基本解説を更新する作業を継続する。"
    interpreted_outcome: "全261問について、具体的で現行法に裏付けられた基本解説と参照情報を一問単位で完成させる。"
    input_shape: existing_plan
    audience: "ガス主任技術者試験の受験者と運用者"
    authority: requested
    proof_type: source_backed_answer
    completion_proof: "261問すべての精査・公開成果物・検証が完了し、未処理項目が0になること。"
    likely_misfire: "00_sourceやIDを変える、複数問を一括判断する、曖昧な解説を残す、全問完了前にFirestoreへ反映する。"
    blind_spots_considered:
      - "既存lawRevisionFactsの直接根拠が誤っている場合がある。"
      - "空欄組合せ問題では誤っている空欄を個別に示す必要がある。"
      - "現行法とcorrectChoiceTextが明白に矛盾する場合はsourceを直さずflagへ回す。"
      - "e-Gov参照は条・項・号・細目とhashを保存する。"
    existing_plan_facts:
      - "mainのみを使用し、一問ごとにcommitしてorigin/mainへpushする。"
      - "00_sourceと既存questionIdを変更しない。"
      - "各問の具体的なexplanationTextをpush前にチャットへ表示する。"
      - "Firestore反映は全261問と公開成果物の完成後に行う。"

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  exact_human_approval_can_terminal_wait: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 261
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: false
    worker_completes_whole_slice: true

agents:
