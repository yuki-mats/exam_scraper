  slug: "gas-shunin-law-explanation-refresh"
  kind: existing_plan
  tranche: "pending問題を一問ずつ公式e-Govで精査し、検証・commit・origin/main pushまで継続する。"
  status: active
  oracle:
    signal: "summary.jsonで261問適用済み、pending/error/未処理flagが0、公開成果物監査と17テストが通り、00_sourceと既存IDが不変。"
    cadence: "各設問のWorker完了後と最終PM監査時"
    final_proof: "全decision、summary/ledger、e-Gov hash、公開成果物、テスト、git同期を対応付けた最終PM receipt。"
