version: 2

goal:
  title: "二級建築士 explanationText パッチ品質底上げ"
  slug: "improve-nikyu-kenchikushi-explanationtext"
  kind: existing_plan
  tranche: "85002 から 85011 までの棚卸し済み 32 ファイルを、一問ずつ explanationText 品質基準へ引き上げる。"
  status: active
  oracle:
    signal: "棚卸し済み 32 ファイルの各 explanationText が、正誤・根拠・誤り箇所・正しい内容を具体的に示し、法令問題では確認可能な法令条項を明記している。"
    cadence: "各 Worker 完了後と最終監査時"
    final_proof: "32 ファイルの done receipt、各 file-level coverage check、薄い定型句監査、法令条項確認を含む最終 Judge/PM 監査 receipt。"
  intake:
    original_request: "85002 から 85011 までの二級建築士 explanationText を、一問ずつ goal-prep で進めたい。"
    interpreted_outcome: "棚卸し済みの更新対象 32 ファイルが、一問ずつ順番に改善される board が用意されている。"
    input_shape: existing_plan
    audience: "二級建築士試験の受験者"
    authority: requested
    proof_type: artifact
    completion_proof: "32 個の question-level Worker が完了し、各対象ファイルで品質基準と個別検証を満たし、最終監査が full_outcome_complete: true を記録する。"
    likely_misfire: "対象外ファイルを触る、複数問をまとめて更新する、法令条項を書かない、または薄い説明を残したまま完了扱いにする。"
    blind_spots_considered:
      - "85001 と 850003 を誤って tranche に含めること"
      - "棚卸し結果と実際の着手順の不一致"
      - "法令問題で条・項・号の裏取りが弱いこと"
      - "Web 検索が主ソース化すること"
      - "選択肢本文の言い換え止まりになること"
    existing_plan_facts:
      - "対象は棚卸し済みの 32 ファイルに限定する。"
      - "順序は 85002 から 85011 までで、一問ずつ進める。"
      - "prompt/03_prompt_add_explanationText.md を品質基準に使う。"
      - "ローカル成果物を優先しつつ、裏取り目的に限って Web 検索を使ってよい。"
      - "法令問題では確認できた法令条項を explanationText に明記する。"
      - "会話・報告は日本語で行い、変更時には作業内容と保存先を明示する。"

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 32
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: false
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: generated
    url: "http://goalbuddy.localhost:41737/improve-nikyu-kenchikushi-explanationtext/"
    command: "npx goalbuddy board docs/goals/improve-nikyu-kenchikushi-explanationtext"

active_task: T101

tasks:
  - id: T001
    type: pm
    assignee: PM
    status: done
    reasoning_hint: medium
    objective: "85002 から 85011 までの更新対象ファイルを棚卸しし、現 tranche の対象と順序を固定する。"
    expected_output:
      - "対象ファイル一覧"
      - "件数"
      - "優先順"
    receipt:
      result: done
      summary: "85002 から 85011 までの explanationText パッチを棚卸しし、更新対象は 10 年度・32 ファイルに確定した。85001 は更新済み、850003 は今回の tranche から除外した。"
      evidence:
        - "対象年度: 85002, 85003, 85004, 85005, 85006, 85007, 85008, 85009, 85010, 85011"
        - "対象件数: 32 files"
        - "優先順: 年度昇順、同一年内は question_*_merged の棚卸し順"
      notes:
        - "85002=4, 85003=5, 85004=1, 85005=2, 85006=2, 85007=4, 85008=3, 85009=2, 85010=2, 85011=7"
