    inputs:
      - "T001 receipt"
      - "prompt/03_prompt_add_explanationText.md"
    constraints:
      - "Do not implement."
      - "年度一括の粗いバッチ化は承認しない。"
      - "法令条項の裏取りルールを弱めない。"
    expected_output:
      - "Decision"
      - "Execution order"
      - "Worker shape"
    receipt:
      result: done
      decision: approved
      full_outcome_complete: false
      rationale: "ユーザーが『85002から85011まで一問ずつ』を明示しているため、question-level Worker を 32 件 queued し、85002 の先頭対象から順に処理する構成が最も安全である。"
      worker_objective: "各 Worker は対応する 1 ファイルだけを改善し、個別 coverage check と薄い定型句監査を通す。法令問題では確認可能な法令条項を explanationText に明記する。"
