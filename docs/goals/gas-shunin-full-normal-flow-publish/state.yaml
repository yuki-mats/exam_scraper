      - "全対象のquality-gate成功を確認する。"
      - "upload dry-runのproject ID、artifact hash、追加・更新・不変件数を確認する。"
      - ".venv/bin/python scripts/check/check_00_source_immutability.py"
    stop_if:
      - "未評価、古い評価、hold、品質ゲート失敗、未承認正答差分がある。"
      - "00_source、既存ID、対象外documentに差分がある。"
      - "UI以外から工程状態を変更する必要がある。"
