      - "Firestore liveがT008以後に変化している。"
      - "UI以外からFirestore書込みが必要になる。"
      - "readback不一致が1件以上ある。"
    receipt: null

  - id: T999
    type: judge
    assignee: Judge
    status: queued
    reasoning_hint: high
    objective: "全問通常フロー一本化、Firestore公開、全件readbackがowner outcomeを完全に満たしたか最終監査する。"
