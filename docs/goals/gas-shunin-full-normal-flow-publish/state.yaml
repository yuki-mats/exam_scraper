      - "UIのFirestore反映結果が成功する。"
      - "全対象readbackでcandidate不一致0、missing 0、ID drift 0を確認する。"
      - "乙種2024基礎問9の5documentsがflash_cardで、4.3だけ正しいことを確認する。"
