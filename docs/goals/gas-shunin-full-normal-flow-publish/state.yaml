      - "Current git diff and origin/main parity"
    constraints:
      - "実装・UI操作・Firestore書込みを行わない。"
      - "必須Workerがqueued、active、blockedなら完了を拒否する。"
      - "正答・解説矛盾、未承認正答差分、ID drift、readback不一致が1件でもあれば完了を拒否する。"
      - "対象5件だけの解決を全問完了と扱わない。"
    expected_output:
      - "complete | not_complete"
      - "full_outcome_complete: true | false"
      - "oracle各項目の証拠"
      - "未完項目と次task"
