      - ".venv/bin/python scripts/check/check_00_source_immutability.py"
      - "対象問題の正答・解説・00_source差分を再確認する。"
    stop_if:
      - "T005が公開候補生成へ進行可とし、再整備対象が0件ならno-op receiptを返す。"
