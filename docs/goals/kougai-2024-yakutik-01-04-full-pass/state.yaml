version: 2

goal:
  title: "公害防止管理者 2024 yaku-tik 01-04 full pass"
  slug: "kougai-2024-yakutik-01-04-full-pass"
  kind: existing_plan
  tranche: "2024 年度 yaku-tik 6ファイル・135問を canonical 00_source にして、01→02→03→04 を一問一問目視クオリティで完走する。"
  status: active
  oracle:
    signal: "2024 canonical 00_source が yaku-tik 6ファイル・135問だけになり、10_questionType_fixed/, 15_correctChoiceText_fixed/, 21_explanationText_added/, 22_questionSetId_linked/ が review ledger と coverage check で全 135 問一致すること。"
    cadence: "after each Worker package and at final audit"
    final_proof: "135 問すべてについて 01→04 の固定名 patch、20_merged_1、30_merged_2、review ledger 完了行、検証 receipt、upload dry-run readiness が揃っていること。"
  intake:
    original_request: "00_source配下をyaku-tikのみにして、全ての問題を一問一問目視クオリティで01~04プロンプトの作業を進められるようにgoal計画を作成してほしい。"
    interpreted_outcome: "公害防止管理者 2024 年度を yaku-tik only source として固定し、135 問を 01〜04 の順で安全に人手レビューできる計画と board を用意する。"
    input_shape: existing_plan
    audience: "公害防止管理者の問題データ整備とアプリ利用者"
    authority: requested
    proof_type: "artifact + review + test"
    completion_proof: "canonical source 135 問、stage patch coverage、review ledger、merge、dry-run readiness が一致すること。"
    likely_misfire: "zoron / qualification-text などの重複 source を混ぜる、bulk 自動生成だけで目視済みにする、questionSetId を category 外で作る、merge/dry-run なしで完了扱いにする。"
    blind_spots_considered:
      - "現在の 2024 00_source は yaku-tik 6ファイル 135問と zoron 3ファイル 75問の混在状態。"
      - "yaku-tik は穴埋めが多く、choice-level true/false として扱う設計確認が必要。"
      - "03 は yaku-tik 解説が第一根拠。不足時だけ一次情報を補助する。"
      - "04 の前提となる kougai qualification docs / category.json が不足する可能性がある。"
      - "output/ 配下は ignore 対象が多く、Git 管理する成果物は明示的に範囲確認が必要。"
    existing_plan_facts:
      - "2024 年度は yaku-tik のみを canonical source にする。"
      - "multi-source raw evidence は削除せず退避する。"
      - "01→02→03→04 の順を守る。"
      - "一問一問の本文・設問・選択肢・正誤・解説を照合する。"
      - "固定ファイル名で上書きし、タイムスタンプ付き patch を増やさない。"
      - "questionSetId は category.json の questionSets[].questionSetId のみ使う。"
      - "Firestore live upload は別途ユーザー承認なしに実行しない。"

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/kougai-2024-yakutik-01-04-full-pass/"
    command: "npx goalbuddy board docs/goals/kougai-2024-yakutik-01-04-full-pass"

progress:
  qualification: "kougai"
  target_year: 2024
  target_source: "yaku-tik"
