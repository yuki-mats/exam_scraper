version: 2

goal:
  title: "00_source 全資格不変化と過去変更復元"
  slug: "00-source-immutability-and-restoration"
  kind: recovery
  tranche: "過去変更19ファイルを復元し、全source immutable guardを導入・検証する。"
  status: active
  oracle:
    signal: "復元19ファイル、全source hash manifest、pre-commit gate、拒否/許可テスト、資格別patch検証がすべてgreen。"
    cadence: "各Worker package後と最終監査時"
    final_proof: "復元前後blob、patch保持、manifest全件一致、guardテスト、git同期を対応付けた最終receipt。"
  intake:
    original_request: "スクレイピング後は00_sourceを直接変更できず、パッチだけで修正し、過去変更も元に戻す。"
    interpreted_outcome: "全資格で00_sourceは作成後不変となり、既存19変更は修正内容をパッチに残したまま復元される。"
    input_shape: recovery
    audience: "exam_scraperのデータ作成・レビュー・公開担当者"
    authority: requested
    proof_type: test
    completion_proof: "既存source変更拒否、新規追加許可、19ファイル復元、patch検証、全source hash一致。"
    likely_misfire: "新規scrapeを禁止する、修正結果を失う、Git追跡ファイルだけを守る。"
    blind_spots_considered:
      - "output配下の非追跡sourceが多数ある。"
      - "過去変更にはcorrectChoiceText、questionIntent、choiceText、source metadataが含まれる。"
      - "manifest未登録の新規scrapeを安全に登録する操作が必要。"
    existing_plan_facts:
      - "新規00_source追加は許可する。"
      - "修正は10/15/21/22/23等の派生パッチへ入れる。"

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  exact_human_approval_can_terminal_wait: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
