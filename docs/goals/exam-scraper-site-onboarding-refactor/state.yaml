        - "scripts/upload/upload_questions_to_firestore.py"
        - "scripts/upload/upload_category_to_firestore.py"
        - "scripts/convert/convert_merged_to_firestore.py"
        - "config/requirements/required_fields.toml"
        - "document/operations/exam_pipeline_manual_and_automation.md"
      repaso_sources_of_truth:
