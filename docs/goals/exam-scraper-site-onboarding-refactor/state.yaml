version: 2

goal:
  title: "Exam Scraper Site Onboarding Refactor"
  slug: "exam-scraper-site-onboarding-refactor"
  kind: open_ended
  tranche: "Clean up the repo, standardize future site onboarding, then finish SG against the shared pattern."
  status: done
  intake:
    original_request: "新しい資格サイトから過去問を取得しやすくするため、無駄なファイルを削除し、全体をリファクタリングして整理してほしい。"
    interpreted_outcome: "Future qualification sites can be added through a documented, verified scraper onboarding pattern that produces existing-compatible pipeline inputs and upload-ready outputs."
    input_shape: vague
    audience: "Repository owner and future Codex runs adding qualification scrapers."
    authority: requested
    proof_type: artifact
    completion_proof: "Operations docs and this state file clearly show progress; representative pipeline commands pass; unnecessary files are deleted or retained with evidence; SG conforms to the shared pattern."
    likely_misfire: "Cleaning random files or polishing SG while leaving future site onboarding ambiguous."
    blind_spots_considered:
      - "Current worktree contains many unrelated or pre-existing changes; do not revert owner work."
      - "Category and questionSetId are created separately and must not be forced into source scraping."
      - "Existing 00_source shape is the compatibility contract for new scrapers."
      - "Generated output under output/ may be needed for verification but should not become source truth."
    existing_plan_facts:
      - "Implementation priority: 2 existing cleanup, then 1 new-site standardization, then 3 SG finish."
      - "Completion evidence priority: 1 docs/state visibility, then 2 passing commands, then 3 cleanup/removal."
      - "No visual board; use docs/goals state as the progress surface."
      - "Follow document/operations/exam_pipeline_manual_and_automation.md."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: none
  local:
    status: not_requested
    url: null
    command: "npx goalbuddy board docs/goals/exam-scraper-site-onboarding-refactor"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: null

tasks:
