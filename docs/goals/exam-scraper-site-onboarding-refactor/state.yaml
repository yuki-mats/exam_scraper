    type: scout
    assignee: Scout
    status: done
    reasoning_hint: medium
    objective: "Map current operations docs, scraper implementations, output shapes, generated clutter, and verification commands before any cleanup."
    inputs:
      - "document/operations/exam_pipeline_manual_and_automation.md"
      - "document/operations/ai_patch_execution_prompt_templates.md"
      - "output/*/questions_json/*/00_source/*.json"
      - "scripts/scrape/"
      - "code.py"
      - "scrape_gassyunin.py"
      - "scrape_sgsiken.py"
      - "tests/"
      - "git status --porcelain"
    constraints:
      - "Read-only."
      - "Do not edit or delete files."
      - "Separate generated artifacts, owner changes, obsolete files, and active source files."
      - "Use concrete file-path evidence."
    expected_output:
      - "Current pipeline contract summary."
      - "Existing scraper/output shape comparison."
      - "Cleanup candidates with evidence and risk."
      - "Standardization candidates for future site onboarding."
      - "Representative verification commands."
      - "Recommended next Worker/Judge tasks."
    receipt:
      result: done
      summary:
        - "Operations doc contract confirmed at document/operations/exam_pipeline_manual_and_automation.md."
        - "Output contract: output/<qualification>/questions_json/<list_group_id>/00_source/*.json is the pipeline input; images live under output/<qualification>/question_images/<list_group_id>/ and storage URLs are under question_images/official/<qualification>/."
        - "Runner entrypoint confirmed at scripts/scrape/run_qualification_scrape.py with scraper_type routing."
        - "pyproject/tox not present; prefer unittest. pytest fails due to stdlib module name collision with repo root code.py."
      evidence:
        - "document/operations/exam_pipeline_manual_and_automation.md"
        - "scripts/scrape/run_qualification_scrape.py"
        - "scripts/scrape/common.py"
        - "output/*/questions_json/*/00_source/*.json"

