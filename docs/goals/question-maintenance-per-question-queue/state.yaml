version: 2

goal:
  title: "一問完結型の問題整備キュー"
  slug: "question-maintenance-per-question-queue"
  kind: existing_plan
  tranche: "continuous execution: 一問単位の並列整備・確定・失敗隔離・再開を実装し、範囲指定UIから安定運用できるまで進める"
  status: active
  oracle:
    signal: "UIからガス主任技術者甲種2019年の58問を開始し、1問が失敗しても57問が確定し、失敗問だけを理由付きで再実行できる"
    cadence: "after each Worker package and at final audit"
    final_proof: "自動テスト、再起動を挟むrun readback、ガス主任技術者甲種2019年の実UI実行ログと成果物readback"
  intake:
    original_request: "一問ずつ着実に整備し、開始範囲は資格や年度・回のまま維持する。ガス主任技術者試験2019年をUIから実行できるかで判断する"
    interpreted_outcome: "資格・年度・回で選んだ対象を一問単位の独立キューとして並列整備し、単一writerで安全に確定して、成功問を巻き戻さず失敗問だけを再開できる"
    input_shape: existing_plan
    audience: "問題整備を行う運用者"
    authority: approved
    proof_type: demo
    completion_proof: "1問失敗、再起動、失敗問再実行、成果物再生成に加え、ガス主任技術者甲種2019年のUI実行が成功する"
    likely_misfire: "画面上だけ一問単位に見せ、検証・commit・rollback・再試行を年度又はrun単位のまま残す"
    blind_spots_considered:
      - "工程間の依存関係"
      - "入力又は方針変更時だけ必要な再検証"
      - "成果物再生成を一問ごとに連打する無駄"
      - "server再起動後の二重実行"
      - "同一patchへの複数writer"
      - "並列workerの隔離と単一commit writer"
    existing_plan_facts:
      - "開始範囲は資格・年度・回で指定する"
      - "内部の処理、検証、確定、失敗、再実行は一問単位にする"
      - "一問ごとの判断と修正案作成は上限付きで並列化し、本体patchへのcommitだけを直列化する"
      - "成功済み問題は入力又は評価方針が変わらない限り再検証しない"
      - "失敗問の依存後続だけを止め、独立した問題は進め続ける"
      - "patch保存後の自動再生成、artifactSync分離、手動再生成機能を維持する"
      - "最終判断はガス主任技術者甲種2019年を問題整備UIから実行した実績で行う"

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  exact_human_approval_can_terminal_wait: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
