      - "最終自動テスト"
      - "再起動を含むrun readback"
      - "デスクトップ・モバイルbrowser walkthrough"
      - "git diffと正本文書"
    constraints:
      - "Do not implement."
      - "必要なWorker taskがqueued又はactiveなら完了を拒否する。"
      - "単一fixtureだけでなく既存範囲選択との互換を確認する。"
      - "本番Firestore未実行は欠陥としない。"
    expected_output:
      - "complete | not_complete"
      - "full_outcome_complete: true | false"
      - "oracle evidence map"
      - "missing evidence"
      - "next task if not complete"
    receipt: null

