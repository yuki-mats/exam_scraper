  slug: "mecnet-kokushi-01-04-full-pass"
  kind: existing_plan
  tranche: "Complete all 52 exam occurrences / 13,060 questions through 01→04 with per-occurrence checkpoints and final verification. Individual occurrences such as 95 are checkpoints, not the task boundary."
  status: active
  oracle:
    signal: "All 52 exam-occurrence directories under output/mecnet-kokushi/questions_json have updated 10_questionType_fixed, 15_correctChoiceText_fixed, 21_explanationText_added, and 22_questionSetId_linked outputs, with coverage checks and count reconciliation passing for 13,060 questions. Explanation coverage must pass with --require-law-grounded-flag."
    cadence: "after each Worker package and at final audit"
    final_proof: "Receipts and verification showing 13,060 questions covered end-to-end through 01→04 with no missing or out-of-order patch entries."
  intake:
    original_request: "プロンプトに従って01→02→03→04 の通し医師国家試験の過去問の問題を整備してほしい"
    interpreted_outcome: "医師国家試験 13,060 問を 01→04 の順で最後まで高精度に整備する"
    input_shape: existing_plan
    audience: "医師国家試験の問題データ整備とアプリ利用者"
    authority: requested
    proof_type: artifact
    completion_proof: "全 52 出題回で patch と merge の成果物が揃い、件数と coverage check が一致する。02後の correctChoiceText 導出結果も監査済みである"
    likely_misfire: "pilot だけで完了扱いにする、法令/制度問題の精度を落とす、correctChoiceText 監査を省く、merge/検証まで到達しない"
    blind_spots_considered:
      - "出題回ごとの分量差"
      - "医療制度・法令問題の混在"
      - "lawGroundedExplanationNotNeeded の保守的判定"
      - "長時間実行時の checkpoint/resume"
    existing_plan_facts:
      - "mecnet-kokushi の inventory と 00_source は 13,060 問で一致済み"
      - "category.json は MHLW ブループリント命名で整備済み"
      - "03 では lawGroundedExplanationNotNeeded を追加済み"
      - "作業順は 01 → 02 → 03 → 04 を厳守する"
      - "02 後に correctChoiceText 導出結果を監査し、疑義があれば 23_correctChoiceText_fixed を作る"
      - "問題文・選択肢・元解説の突き合わせで判断し、キーワード一致だけの機械的な分類は使わない"
      - "95回などの個別出題回は中間 checkpoint であり、active task や完了判定を単一出題回に閉じない"

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: unknown
  worker: unknown
  judge: unknown

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/mecnet-kokushi-01-04-full-pass/"
    command: "npx goalbuddy board docs/goals/mecnet-kokushi-01-04-full-pass"

active_task: T003

tasks:
  - id: T001
    type: pm
    assignee: PM
    status: done
    reasoning_hint: high
    objective: "Validate the existing 01→04 plan, lock the pilot slice, and produce the operating contract for the first Worker package."
    inputs:
      - "prompt/01_prompt_fix_questionType.md"
      - "prompt/02_prompt_fix_questionIntent.md"
      - "prompt/03_prompt_add_explanationText.md"
