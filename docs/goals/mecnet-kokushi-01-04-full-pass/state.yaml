      - "医療制度・法令問題の混在"
      - "lawGroundedExplanationNotNeeded の保守的判定"
      - "長時間実行時の checkpoint/resume"
    existing_plan_facts:
      - "mecnet-kokushi の inventory と 00_source は 13,060 問で一致済み"
      - "category.json は MHLW ブループリント命名で整備済み"
      - "03 では lawGroundedExplanationNotNeeded を追加済み"
      - "作業順は 01 → 02 → 03 → 04 を厳守する"
      - "02 後に correctChoiceText 導出結果を監査し、疑義があれば 23_correctChoiceText_fixed を作る"
      - "問題文・選択肢・元解説の突き合わせで判断し、キーワード一致だけの機械的な分類は使わない"

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: unknown
  worker: unknown
  judge: unknown

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/mecnet-kokushi-01-04-full-pass/"
    command: "npx goalbuddy board docs/goals/mecnet-kokushi-01-04-full-pass"

active_task: T003

tasks:
