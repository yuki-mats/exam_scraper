      - "document/operations/exam_pipeline_manual_and_automation.md"
    constraints:
      - "Read-only except for goal state files."
      - "Do not edit implementation files."
      - "Preserve the user's existing plan facts."
    expected_output:
      - "Validated tranche scope"
      - "First safe Worker objective"
      - "allowed_files"
      - "verify"
      - "stop_if"
      - "Checkpoint strategy"
      - "correctChoiceText review gate"
      - "03 require-law-grounded-flag gate"
    receipt: null
  - id: T002
    type: judge
    assignee: Judge
    status: queued
    reasoning_hint: high
    objective: "Choose the largest safe first Worker slice after validating the pilot plan."
    inputs:
      - "T001 receipt"
    constraints:
      - "Do not implement."
      - "Pick a bounded slice that still changes behavior."
    expected_output:
      - "Decision"
      - "Exact Worker objective"
      - "allowed_files"
      - "verify"
      - "stop_if"
      - "Blocked or deferred tasks"
      - "Quality gates that must pass before the slice can be marked done"
    receipt: null
  - id: T003
    type: worker
    assignee: Worker
    status: queued
    reasoning_hint: high
    objective: "Execute the first safe implementation slice selected by Judge."
    allowed_files: []
    verify: []
    stop_if:
      - "Need files outside allowed_files."
      - "Behavior is ambiguous."
      - "Verification fails twice."
    receipt: null
  - id: T999
    type: judge
    assignee: Judge
    status: queued
    reasoning_hint: high
    objective: "Audit whether the implemented slices satisfy the full 13,060-question 01→04 outcome."
    inputs:
