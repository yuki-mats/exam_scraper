      - "correctChoiceText review gate"
      - "03 require-law-grounded-flag gate"
    receipt:
      result: done
      summary: "Validated the full 13,060-question / 52-occurrence plan and locked the quality gates for 01→04. 95 is only the first checkpoint touched during execution, not a scope limit."
      evidence:
        - "docs/goals/mecnet-kokushi-01-04-full-pass/goal.md"
        - "docs/goals/mecnet-kokushi-01-04-full-pass/state.yaml"
        - "output/mecnet-kokushi/inventory/inventory_summary.json"
        - "output/mecnet-kokushi/questions_json/95/00_source/question_95.json"
      spawned_tasks:
        - T002
  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Choose the largest safe Worker package after validating the full 13,060-question plan."
    inputs:
      - "T001 receipt"
    constraints:
      - "Do not implement."
      - "Do not narrow the goal to a single exam occurrence."
      - "Use exam occurrences only as checkpoint/resume units inside the full package."
    expected_output:
