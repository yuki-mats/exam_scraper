      - "python3 scripts/check/check_explanation_patch_coverage.py --source output/mecnet-kokushi/questions_json/95/20_merged_1/question_95_merged.json --patch output/mecnet-kokushi/questions_json/95/21_explanationText_added/<latest>.json --require-law-grounded-flag"
      - "python3 scripts/check/check_question_set_patch_coverage.py --source output/mecnet-kokushi/questions_json/95/20_merged_1/question_95_merged.json --patch output/mecnet-kokushi/questions_json/95/22_questionSetId_linked/<latest>.json --category output/mecnet-kokushi/category/category.json"
      - "python3 scripts/check/check_questionSetId.py --category output/mecnet-kokushi/category/category.json --original output/mecnet-kokushi/questions_json/95/00_source/question_95.json --fixed output/mecnet-kokushi/questions_json/95/22_questionSetId_linked/<latest>.json --compare-count --questionset-only"
      - "python3 scripts/pipeline/prepare_firestore_upload.py 95 -b output/mecnet-kokushi/questions_json --upload-dry-run"
    stop_if:
      - "Need files outside allowed_files."
      - "Behavior is ambiguous."
      - "Verification fails twice."
      - "A question requires prompt/category policy changes instead of local patching."
