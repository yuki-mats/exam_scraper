      - "Exact Worker objective"
      - "allowed_files"
      - "verify"
      - "stop_if"
      - "Blocked or deferred tasks"
      - "Quality gates that must pass before the slice can be marked done"
    receipt:
      result: done
      decision: "approved"
      full_outcome_complete: false
      rationale: "Use all 52 exam occurrences under output/mecnet-kokushi/questions_json as the Worker package. Individual occurrences, including 95, are checkpoint/resume units only and cannot satisfy completion by themselves."
      blocked_tasks: []
  - id: T003
    type: worker
    assignee: Worker
    status: active
    reasoning_hint: high
    objective: "Complete all 52 exam occurrences / 13,060 questions end-to-end through 01→04, including merge, conversion, and upload-dry-run verification. Use each occurrence as a checkpoint, not as the task boundary."
    allowed_files:
      - "output/mecnet-kokushi/questions_json/*/10_questionType_fixed/**"
      - "output/mecnet-kokushi/questions_json/*/12_merged_questionType/**"
      - "output/mecnet-kokushi/questions_json/*/15_correctChoiceText_fixed/**"
      - "output/mecnet-kokushi/questions_json/*/20_merged_1/**"
      - "output/mecnet-kokushi/questions_json/*/21_explanationText_added/**"
      - "output/mecnet-kokushi/questions_json/*/22_questionSetId_linked/**"
      - "output/mecnet-kokushi/questions_json/*/23_correctChoiceText_fixed/**"
      - "output/mecnet-kokushi/questions_json/*/30_merged_2/**"
      - "output/mecnet-kokushi/questions_json/*/40_convert/**"
      - "output/mecnet-kokushi/questions_json/upload_to_firestore/**"
    verify:
      - "python3 - <<'PY'\nimport json\nfrom pathlib import Path\ns=json.loads(Path('output/mecnet-kokushi/inventory/inventory_summary.json').read_text())\nassert s['site_total']==13060 and s['source_total_matched']==13060 and s['missing_total']==0\nprint('inventory ok: 13060')\nPY"
      - "For each exam occurrence: python3 scripts/check/check_questiontype_patch_coverage.py --source output/mecnet-kokushi/questions_json/<occurrence>/00_source/question_<occurrence>.json --patch output/mecnet-kokushi/questions_json/<occurrence>/10_questionType_fixed/<latest>.json"
      - "python3 scripts/check/check_question_intent_correct_choice_text_distribution.py --output-root output/mecnet-kokushi/questions_json --glob '*/30_merged_2/*.json'"
      - "For each exam occurrence: python3 scripts/check/check_explanation_patch_coverage.py --source output/mecnet-kokushi/questions_json/<occurrence>/20_merged_1/question_<occurrence>_merged.json --patch output/mecnet-kokushi/questions_json/<occurrence>/21_explanationText_added/<latest>.json --require-law-grounded-flag"
      - "For each exam occurrence: python3 scripts/check/check_question_set_patch_coverage.py --source output/mecnet-kokushi/questions_json/<occurrence>/20_merged_1/question_<occurrence>_merged.json --patch output/mecnet-kokushi/questions_json/<occurrence>/22_questionSetId_linked/<latest>.json --category output/mecnet-kokushi/category/category.json"
      - "For each exam occurrence: python3 scripts/check/check_questionSetId.py --category output/mecnet-kokushi/category/category.json --original output/mecnet-kokushi/questions_json/<occurrence>/00_source/question_<occurrence>.json --fixed output/mecnet-kokushi/questions_json/<occurrence>/22_questionSetId_linked/<latest>.json --compare-count --questionset-only"
      - "For each exam occurrence: python3 scripts/pipeline/prepare_firestore_upload.py <occurrence> -b output/mecnet-kokushi/questions_json --upload-dry-run"
      - "Final reconciliation proves 52 occurrence outputs and 13,060 question bodies are covered through 01→04."
    stop_if:
      - "Need files outside allowed_files."
      - "Behavior is ambiguous."
      - "Verification fails twice."
      - "A question requires prompt/category policy changes instead of local patching."
      - "A proposed completion proof covers only one occurrence or any subset of the 13,060 questions."
    receipt: null
  - id: T999
    type: judge
    assignee: Judge
    status: queued
    reasoning_hint: high
    objective: "Audit whether the implemented slices satisfy the full 13,060-question 01→04 outcome."
    inputs:
