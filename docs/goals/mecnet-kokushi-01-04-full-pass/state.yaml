      - "Reject completion if any exam occurrence still lacks required outputs."
      - "Reject completion if 03 was not checked with --require-law-grounded-flag."
      - "Reject completion if correctChoiceText was only auto-derived and not audited."
    expected_output:
      - "complete | not_complete"
      - "full_outcome_complete: true | false"
      - "missing evidence"
      - "next task if not complete"
    receipt: null

