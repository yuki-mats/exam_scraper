    input_shape: existing_plan
    audience: "医師国家試験の問題データ整備とアプリ利用者"
    authority: requested
    proof_type: artifact
    completion_proof: "全 52 出題回で patch と merge の成果物が揃い、件数と coverage check が一致する。02後の correctChoiceText 導出結果も監査済みである"
    likely_misfire: "pilot だけで完了扱いにする、法令/制度問題の精度を落とす、correctChoiceText 監査を省く、merge/検証まで到達しない"
