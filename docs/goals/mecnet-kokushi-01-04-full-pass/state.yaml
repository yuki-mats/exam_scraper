      decision: "approved"
      full_outcome_complete: false
      rationale: "Use output/mecnet-kokushi/questions_json/95 as the first Worker slice. It is self-contained, contains 259 questions, and has no existing 01→04 outputs, so it is a clean pilot for the full pipeline."
      blocked_tasks: []
  - id: T003
    type: worker
    assignee: Worker
    status: active
    reasoning_hint: high
    objective: "Complete the 95 exam-occurrence pilot end-to-end through 01→04, including merge and upload-dry-run verification."
    allowed_files:
      - "output/mecnet-kokushi/questions_json/95/10_questionType_fixed/**"
      - "output/mecnet-kokushi/questions_json/95/12_merged_questionType/**"
      - "output/mecnet-kokushi/questions_json/95/15_correctChoiceText_fixed/**"
      - "output/mecnet-kokushi/questions_json/95/20_merged_1/**"
      - "output/mecnet-kokushi/questions_json/95/21_explanationText_added/**"
      - "output/mecnet-kokushi/questions_json/95/22_questionSetId_linked/**"
      - "output/mecnet-kokushi/questions_json/95/23_correctChoiceText_fixed/**"
      - "output/mecnet-kokushi/questions_json/95/30_merged_2/**"
      - "output/mecnet-kokushi/questions_json/95/40_convert/**"
      - "output/mecnet-kokushi/questions_json/upload_to_firestore/**"
    verify:
      - "python3 scripts/check/check_questiontype_patch_coverage.py --source output/mecnet-kokushi/questions_json/95/00_source/question_95.json --patch output/mecnet-kokushi/questions_json/95/10_questionType_fixed/<latest>.json"
