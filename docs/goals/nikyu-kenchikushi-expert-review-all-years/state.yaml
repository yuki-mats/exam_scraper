version: 2
goal:
  title: 二級建築士 全年度(2015-2025) 専門家レビュー
  slug: nikyu-kenchikushi-expert-review-all-years
  kind: existing_plan
  tranche: 2nd-class-kenchikushi / 2015-2025 (list_group_id=85001..85011) を 1問=1Worker で専門家レビューする。次に進める tranche は active_task を正とし、2016-2020 (list_group_id=85002..85006) は subgoal (T628..T632) として処理する。
  status: active
  oracle:
    signal: 対象設問ごとに正しい回答と専門家水準の解説品質が確認され、必要な patch 更新、coverage check、内容監査に通っている。
    cadence: 各 Worker 完了後と最終監査時
    final_proof: 全年度全設問の done receipt、検証コマンド結果、最終 Judge/PM 監査 receipt。
  intake:
    original_request: goal 目標を立てて、2nd kentikushi に対して実行したい。
    interpreted_outcome: 二級建築士 2015-2025 の全年度について、1 Worker = 1問で correctChoiceText と explanationText を専門家水準に引き上げる長期 goal を継続実行できる状態にする。
    input_shape: existing_plan
    audience: 二級建築士試験の受験者と運用者
    authority: requested
    proof_type: artifact
    completion_proof: '対象 2015-2025 全年度の全設問が全件処理され、各 question-level receipt と file-level verification を通り、専門家水準の最終監査が full_outcome_complete: true を記録する。'
    likely_misfire: 一部年度だけ処理して完了扱い、既存 patch の流用、正答番号だけの機械確認、複数問の雑な一括更新、検証スクリプト通過だけでの完了扱い。
    blind_spots_considered:
      - 既存 explanation-only goal とは範囲が違う。
      - list_group_id=850003 は 85001..85011 の学科Ⅲ（建築構造）と original_question_id が 100% 重複しており、重複レビューが発生する。
      - 23_correctChoiceText_fixed は未作成の年度があるため、必要時のみ作成する。
      - correctChoiceText は questionIntent と answer_result_text の整合だけでなく、元解説・選択肢まで確認する必要がある。
      - explanationText は参考書著者水準で確認する必要がある。
      - coverage check は必要条件であり、正答精度と解説品質の十分条件ではない。
    existing_plan_facts:
      - 会話・報告は日本語で行う。
      - 変更時には作業内容と保存先を明示する。
      - patch 本文をスクリプトで量産しない。
      - 1 Worker は 1問だけを扱う。
      - Worker は二級建築士の専門家・問題作成者・参考書著者として判断する。
rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2000
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: false
    worker_completes_whole_slice: true
agents:
  scout: installed
  worker: installed
  judge: installed
visual_board:
  selected: local
  local:
    status: generated
    url: http://goalbuddy.localhost:41737/nikyu-kenchikushi-expert-review-all-years/
    command: npx goalbuddy board /Users/yuki/development/exam_scraper/docs/goals/nikyu-kenchikushi-expert-review-all-years
