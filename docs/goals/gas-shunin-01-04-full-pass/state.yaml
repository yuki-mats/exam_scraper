version: 2

goal:
  title: "ガス主任技術者 甲種・乙種 01-04 manual review"
  slug: "gas-shunin-01-04-full-pass"
  kind: existing_plan
  tranche: "gas-shunin-kou 2019-2025 412問、gas-shunin-otsu 2017-2025 522問を 1問=1Worker でレビューする。"
  status: active
  oracle:
    signal: "対象934問について 01 questionType、02 questionIntent/correctChoiceText、03 explanationText、04 questionSetId が一問ずつ確認され、coverage/merge/upload-prep相当の検証に通る。"
    cadence: "各Worker完了後と最終監査時"
    final_proof: "review jsonl の全行完了、固定名patch、検証結果、最終Judge/PM監査receipt。"
  intake:
    original_request: "ガス主任技術者試験においても01〜04promptの作業をできるようにし、甲種・乙種を一問一問、精度高く目視クオリティで実施したい。必要な準備をまずしてほしい。"
    interpreted_outcome: "Firestore既存IDを保ったまま、甲種・乙種の01〜04手作業レビューを一問ずつ安全に進められる状態にする。"
    input_shape: existing_plan
    audience: "ガス主任技術者試験の受験者と運用者"
    authority: requested
    proof_type: artifact
    completion_proof: "甲種412問・乙種522問の台帳全行が完了し、coverage/merge/upload-prep相当の検証と最終監査が通ること。"
    likely_misfire: "複数問を機械的にまとめる、Firestore既存IDを変える、00_sourceを直接書き換える、本文・選択肢を生成する、根拠薄い解説を確定する、検証通過だけで目視確認済みにする。"
    blind_spots_considered:
      - "甲種Firestore由来データには重複originalQuestionIdがあり、doc ID由来のreviewQuestionIdが必要。"
      - "乙種サイト由来データはpublicQuestionIdを主キーにする。"
      - "sourceQuestionKey/sourceUniqueKeyは照合キーであり、既存Firestore document IDの置換キーではない。"
      - "upload用questionIdは既存Firestore由来ならfirestoreQuestionIds[index]を使い、新規問題だけsourceUniqueKey由来の決定的IDを作る。"
      - "03 explanationText は既存解説・サイト取得・PDF/OCR・一次情報の根拠を分ける必要がある。"
      - "04 questionSetId はFirestore snapshot由来categoryを使う。"
      - "coverage check は必要条件であり、目視品質の十分条件ではない。"
    existing_plan_facts:
      - "会話・報告は日本語で行う。"
      - "変更時には作業内容と保存先を明示する。"
      - "originalQuestionBodyText/originalQuestionChoiceText と 00_source の本文・選択肢を生成・改変しない。"
      - "explanationText/suggested系は、正誤根拠を確認できる場合に生成・補完してよい。"
      - "1 Worker は1問だけを扱う。"
      - "既存FirestoreのquestionId/originalQuestionIdを変更しない。"
      - "既存Firestore由来のupload JSONでは questions[].questionId が firestoreQuestionIds の既存doc IDと一致することをdry-run前に検証する。"

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 934
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: false
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

