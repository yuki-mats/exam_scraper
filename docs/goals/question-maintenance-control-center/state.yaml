version: 2

goal:
  title: "資格横断問題整備コントロールセンター"
  slug: "question-maintenance-control-center"
  kind: specific
  tranche: "continuous execution: workflow全体を調査・設計・実装・検証し、元の成果が完了するまで進める"
  status: active
  oracle:
    signal: "既存資格と新規資格fixtureで、workflow把握からupload-ready確認までのUI/API/browser walkthroughが通る"
    cadence: "after each Worker package and at final audit"
    final_proof: "自動テスト、実成果物readback、デスクトップ・モバイルbrowser walkthroughをreceiptで示す"
  intake:
    original_request: "これまでの問題整備作業を効率化するシステムとしてレビューUIへ全workflowと全体把握を統合する"
    interpreted_outcome: "全資格で01〜04・02b・03bの状態、目的、次アクションを把握し、安全にupload-readyまで進められる"
    input_shape: specific
    audience: "問題整備を行う運用者"
    authority: approved
    proof_type: demo
    completion_proof: "既存資格と新規資格の双方でend-to-endのブラウザ実演と自動検証が成功する"
    likely_misfire: "単一資格・単一issue専用、又は表示だけで実行不能な局所UIになる"
    blind_spots_considered:
      - "既存正本との重複"
      - "新規資格の空工程"
      - "長時間jobの再開"
      - "本番Firestore誤操作"
      - "資格ごとのfolder差異"
    existing_plan_facts:
      - "01〜04・02b・03b promptとoperations文書を正本とする"
      - "Firestore実アップロードは明示確認時だけ許可する"

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  exact_human_approval_can_terminal_wait: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/question-maintenance-control-center/"
    command: "node /Users/yuki/.codex/plugins/cache/goalbuddy/goalbuddy/0.4.0/skills/goal-prep/surfaces/local-goal-board/scripts/local-goal-board.mjs --goal docs/goals/question-maintenance-control-center"

active_task: T005
