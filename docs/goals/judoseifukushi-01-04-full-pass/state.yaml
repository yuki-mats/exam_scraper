  implementation_notes:
    - "questionIntent の negative phrase 推定に『誤っている組合せ』『誤っている組み合わせ』『誤った組合せ』『誤った組み合わせ』を追加した。"
    - "1993 question_1993_1.json は anatomy / physiology 基礎の単問が多く、flash_card への切替が 5 問発生した。"
    - "00_source の explanation_common_* と explanation_choice_snippets が空の設問では、必要に応じて外部Web一次情報を確認してよい。"
    - "1993 question_1993_2.json では negative flash_card の2問に 23_correctChoiceText_fixed を追加した。"
    - "1993 question_1993_3.json の問73は 00_source の正解1に疑義があり、一次情報寄りの確認を踏まえて正解4へ補正し、merge で answer_result_text も同期できるようにした。"
    - "1993 question_1993_4.json は病理、公衆衛生、関係法規の混在。法規・統計系は当時の用語や制度値を前提に説明した。"
    - "1993 question_1993_5.json は臨床医学総論・各論、外科学が中心。問106は negative flash_card として 23_correctChoiceText_fixed を追加した。"
    - "1993 question_1993_6.json は外科学、整形外科学、運動学、リハビリテーション。問139は negative flash_card として 23_correctChoiceText_fixed を追加した。"
    - "1993 question_1993_7.json は柔道整復理論の関節損傷、軟部組織損傷、脱臼、骨折が中心。問156は『誤っている組合せ』として select_incorrect に補正した。"
    - "1993 question_1993_8.json は柔道整復理論の上肢・下肢各論。23_correctChoiceText_fixed は不要で、1993年200問分の01〜04を完了した。"
    - "1994 question_1994_1.json は解剖学・生理学の基礎。全問 true_false、23_correctChoiceText_fixed は不要だった。"
    - "1994 question_1994_2.json は神経・感覚器・体表解剖と生理学。問32と問49は『誤っている組合せ』として select_incorrect、問41は複数正答のため flash_card にした。"
    - "1994 question_1994_3.json は生理学、運動学、病理学概論。問51と問66は『誤っている組合せ』として select_incorrect に補正した。"
    - "1994 question_1994_4.json は病理学概論、公衆衛生、関係法規。問80・81・83は複数正答のため flash_card、問82は空気組成から正答2へ補正し 23_correctChoiceText_fixed を追加した。"
    - "1994 question_1994_5.json は一般臨床医学と外科学。問109・113は a/b/c/d 組合せ比較のため group_choice、問108・110・120は否定設問として select_incorrect に補正した。"
    - "1994 question_1994_6.json は外科学、整形外科学、リハビリテーション。問134・139は a/b/c/d 組合せ比較のため group_choice、問144・147は複数正答のため flash_card、問128・146は否定組合せとして select_incorrect に補正した。"
    - "1994 question_1994_7.json は柔道整復理論の骨折・脱臼・上肢各論。問158は『誤っている組合せ』として select_incorrect に補正し、問165は a/b/c/d 組合せ比較のため group_choice にした。"
    - "1994 question_1994_8.json は柔道整復理論の下肢骨折、各論・脱臼、軟部組織損傷。問177は『誤っている組合せ』として select_incorrect に補正し、問180・184・186・196は a/b/c/d 組合せ比較のため group_choice にした。1994年200問分の01〜04を完了した。"
    - "1995 question_1995_1.json は解剖学。問3は sourceAnswerStatus=no_answer のため 23_correctChoiceText_fixed で全選択肢を間違いに固定し、問15は『関与しない』設問として select_incorrect に補正した。解なし問題を distribution check で trusted unparseable として扱うよう更新した。"
    - "1995 question_1995_2.json は解剖学と生理学。問40・41は『関与しない』、問47は『誤っている組合せ』として select_incorrect に補正した。問28・29は現行推定ルールに合わせ select_correct のまま説明ラベルを整合させた。"
    - "1995 question_1995_3.json は生理学、運動学、病理学概論。問53・68は『誤っている組合せ』として select_incorrect に補正し、問56・58・67・72・73は a/b/c/d 組合せ比較のため group_choice、問65は複数正答のため flash_card にした。"
    - "1995 question_1995_4.json は病理学概論、衛生学・公衆衛生学、関係法規。問77・83は『誤っている組合せ』として select_incorrect に補正し、問76・86・92・97は group_choice、問83は複数正答の negative flash_card として 23_correctChoiceText_fixed を追加した。"
    - "1995 question_1995_5.json は一般臨床医学と外科学概論。問103・104・107・117・118・125は『誤っている組合せ』として select_incorrect に補正し、問112は a/b/c/d 組合せ比較のため group_choice にした。問105は現行 merge 正本に合わせ select_correct のまま説明ラベルを整合させた。"
    - "1995 question_1995_6.json は外科学概論、整形外科学、リハビリテーション医学。問132は a/b/c/d 組合せ比較のため group_choice、問139・148は否定組合せとして select_incorrect に補正し、問145・146は現行 merge 正本に合わせ select_correct のまま説明ラベルを整合させた。"
    - "1995 question_1995_7.json は柔道整復理論の骨折・脱臼。問154・159・175は group_choice、問165は複数正答の flash_card、問151・166は否定組合せとして select_incorrect に補正した。"
    - "1995 question_1995_8.json は柔道整復理論の脱臼・下肢骨折・関節損傷・症例問題。問188・198は a/b/c/d 組合せ比較のため group_choice、問178・196は『誤っている組合せ』として select_incorrect、問187は『みられない』設問として select_incorrect に補正した。1995年200問分の01〜04を完了した。"
    - "1996 question_1996_1.json は解剖学。全問 true_false のまま、既存 questionIntent を維持した。循環器系、呼吸器系、消化器系、泌尿器系、生殖器系、神経系、感覚器系、運動器系、体表解剖、人体解剖学概説に紐付けた。"
    - "1996 question_1996_2.json は解剖学後半と生理学。全問 true_false のまま、問32・34・42・45・48・49は否定表現として select_incorrect に補正した。神経系、消化器系、体表解剖、内分泌器系、生理学総論、血液、呼吸、栄養と代謝、尿の生成と排泄、神経、体温、消化と吸収、内分泌、筋肉の機能に紐付けた。"
    - "1996 question_1996_3.json は生理学、運動学、病理学概論。全問 true_false のまま、問51・52・68は否定表現として select_incorrect に補正した。内分泌、神経、筋肉、感覚、生殖、歩行、運動制御、姿勢、免疫異常、疾病一般、代謝障害、病因、腫瘍に紐付けた。"
    - "1996 question_1996_4.json は病理学概論、衛生学・公衆衛生学、関係法規、医療法。問92・94は a/b/c/d 組合せ比較のため group_choice、問76・77・83・85は否定表現として select_incorrect に補正した。問84は sourceAnswerStatus=no_answer の解なし問題として、提示4疾患すべてが検疫で重視される感染症に該当する説明にした。"
    - "1996 question_1996_5.json は一般臨床医学と外科学概論。問106・108・119は a/b/c/d 組合せ比較のため group_choice、問107・110・111・113・114・117は否定表現として select_incorrect に補正した。"
    - "1996 question_1996_6.json は外科学概論、整形外科学、リハビリテーション医学。問130・133・142・143は a/b/c/d 組合せ比較のため group_choice、問142・143は否定組合せとして select_incorrect に補正した。"
    - "1996 question_1996_7.json は柔道整復理論の総論、上肢骨折、下肢骨折。問151・153・174は a/b/c/d 組合せ比較のため group_choice、問162・172は複数正答のため flash_card、問154は否定組合せとして select_incorrect に補正した。"
    - "1996 question_1996_8.json は柔道整復理論の下肢骨折、脱臼、軟部組織損傷、症例問題。問184・189・196は a/b/c/d 組合せ比較のため group_choice、問183は複数正答のため flash_card、問176は否定組合せとして select_incorrect に補正した。1996年200問分の01〜04を完了した。"
    - "1997 question_1997_1.json は解剖学中心。全問 true_false のまま、問4・10・20・21・22は否定表現として select_incorrect に補正した。運動器系、呼吸器系、神経系、体表解剖、消化器系、泌尿器系、生殖器系、内分泌器系、感覚器系、生理学総論に紐付けた。"
    - "1997 question_1997_2.json は解剖学後半と生理学前半。全問 true_false のまま、問27・32・35・41・46・48・49は否定表現として select_incorrect に補正した。内分泌器系、体表解剖、神経系、運動器系、感覚器系、生理学総論、血液、循環、呼吸、消化と吸収、栄養と代謝、体温とその調節、尿の生成と排泄、内分泌、生殖、筋肉の機能に紐付けた。"
    - "1997 question_1997_3.json は生理学後半、運動学、病理学概論。問58は a/b/c/d 組合せ比較のため group_choice、問52・56・67・71は否定表現として select_incorrect に補正した。感覚の生理、生殖、筋肉の機能、神経、歩行、運動学総論、運動器の構造と機能、姿勢、頭・頸部・四肢と体幹の運動、免疫異常・アレルギー、腫瘍、先天性異常、進行性病変、炎症、循環障害、疾病の一般に紐付けた。"
    - "1997 question_1997_4.json は衛生学・公衆衛生学と関係法規。問92・95・98・99は a/b/c/d 組合せ比較のため group_choice、問76・77・79・81・90は『誤っている組合せ』として select_incorrect に補正した。公衆衛生、感染症、消毒、環境衛生、柔道整復師法、医師法、医療法に紐付けた。"
    - "1997 question_1997_5.json は一般臨床医学と外科学概論。問102・104・106・114は a/b/c/d 組合せ比較のため group_choice、問105・108・110・111・112・118・119・121・122・124は否定表現として select_incorrect に補正した。診察概論、診察各論、検査法、主要な疾患、滅菌法と消毒法、止血、麻酔、腹部外傷、腫瘍に紐付けた。"
    - "1997 question_1997_6.json は外科学概論、整形外科学、リハビリテーション医学。問131・139・146は a/b/c/d 組合せ比較のため group_choice、問126・127・128・136は誤っている組合せとして、問147・149は否定表現として select_incorrect に補正した。失血と輸血・輸液、頭部外傷、心肺蘇生法、脊柱損傷、整形外科的治療法、骨端症、大腿・膝関節、体幹、骨および軟部腫瘍、非感染性軟部・骨疾患、整形外科検査法、神経・筋疾患、リハビリテーションの評価・治療・関連職種・実際に紐付けた。"
    - "1997 question_1997_7.json は柔道整復理論の総論、骨折、脱臼。問164は a/b/c/d 組合せ比較のため group_choice、問165・174・175は否定表現に合わせて select_incorrect に補正した。偽関節、骨癒合遅延、筋損傷、初期の施術、頭部・体幹骨折、上肢骨折、頭部・体幹脱臼、上肢脱臼に紐付けた。"
    - "1997 question_1997_8.json は柔道整復理論の上肢脱臼、下肢骨折、下肢脱臼、下肢軟部組織損傷、症例問題。問190・197は a/b/c/d 組合せ比較のため group_choice にし、問187は sourceAnswerStatus=no_answer の解なし問題として 23_correctChoiceText_fixed で全選択肢を間違いに固定した。上肢脱臼、上肢骨折、下肢骨折、下肢脱臼、下肢軟部組織損傷に紐付けた。"
    - "1998 question_1998_1.json は解剖学。全問 true_false のまま、問5は sourceAnswerStatus=no_answer の解なし問題として 15_correctChoiceText_fixed と 23_correctChoiceText_fixed で全選択肢を間違いに固定した。問9・18・24は公開 answer key を維持しつつ explanation で本試験の整理基準が分かるよう補った。人体解剖学概説、運動器系、脈管系、消化器系、呼吸器系、泌尿器系、生殖器系、内分泌器系、神経系、感覚器系、体表解剖に紐付けた。"
    - "1998 question_1998_2.json は解剖学後半と生理学。全問 true_false のまま、問32・38・44・45・46・47・50は否定表現として select_incorrect に補正し、問48は複数正答の true_false として維持した。解剖学の内分泌器系・神経系・運動器系・人体解剖学概説・体表解剖と、生理学の血液・呼吸・栄養と代謝・体温・尿の生成と排泄・内分泌・生殖・骨の生理・神経・筋肉の機能・感覚の生理に紐付けた。"
    - "1998 question_1998_3.json は生理学、運動学、病理学概論、公衆衛生、整形外科学。問67は a/b/c/d 組合せ比較のため group_choice に変更し、問58・70・74は否定表現として select_incorrect に補正した。副腎髄質ホルモン、神経、筋収縮、感覚、生殖、体幹・肩・股・膝・足関節運動、歩行、病因、免疫異常、炎症、腫瘍、公害・中毒疾患、ビタミン欠乏、進行性筋疾患に紐付けた。"
    - "1998 question_1998_4.json は外科学、公衆衛生、関係法規。問92・93は a/b/c/d 組合せ比較のため group_choice、問90は否定表現に合わせて select_incorrect に補正し、問83は解なしとして 23_correctChoiceText_fixed を追加した。熱傷、腫瘍、出血、疫学、衛生統計、母子保健、職業病、食中毒、水質、感染性廃棄物、大気汚染、予防接種、消毒、柔道整復師法、保健師助産師看護師法、医師法に紐付けた。"
    - "1998 question_1998_5.json は一般臨床医学と外科学。問102は a/b/c/d 組合せ比較のため group_choice、問105は複数正答の negative flash_card として 23_correctChoiceText_fixed を追加し、問101・109・115・122は否定表現に合わせて select_incorrect に補正した。診察各論、主要な疾患、進行性病変、ショック、輸血・輸液、麻酔、止血、神経筋疾患に紐付けた。"
    - "1998 question_1998_6.json は外科学概論、整形外科学、リハビリテーション医学。問127・128は解なしとして 23_correctChoiceText_fixed で全選択肢を間違いに固定し、問132は複数正答の flash_card、問135・137・138は『誤っている組合せ』として select_incorrect に補正した。心肺蘇生法、頭部・脳卒中・胸腹部外傷、骨端症、骨関節損傷、体幹、感染性疾患、骨腫瘍、検査法、障害分類、リハビリ評価・治療・実際に紐付けた。"
    - "1998 question_1998_7.json は柔道整復理論の骨折、脱臼、関節損傷、軟部組織損傷、初期施術。全問 true_false のまま既存 questionIntent を維持し、23_correctChoiceText_fixed は不要と判定した。疲労骨折、固定材料、捻挫初期治療、上肢骨折、胸鎖・肩・手根中手・肘関節脱臼、腱板損傷に紐付けた。"
    - "1998 question_1998_8.json は柔道整復理論の下肢領域と整形外科学の骨盤・体幹・股関節・膝・足関節をまたぐ内容。問184は a/b/c/d 組合せ比較のため group_choice にし、問185・193・195は否定設問として select_incorrect に補正した。問188は 00_source の stem 欠落があり、外部参照で大腿骨下1/3部骨折の設問として explanation を補った。1998年200問分の01〜04を完了した。"
    - "1999 question_1999_1.json は解剖学。全問 true_false のまま既存 questionIntent を維持し、23_correctChoiceText_fixed は不要と判定した。人体解剖学概説、運動器系、脈管系、消化器系、呼吸器系、生殖器系、内分泌器系、神経系、感覚器系に紐付けた。"
    - "1999 question_1999_2.json は体表解剖と生理学。問38・40・41・45は negative stem に合わせて select_incorrect に補正し、問48は sourceAnswerStatus=no_answer の解なし問題として 15_correctChoiceText_fixed と 23_correctChoiceText_fixed で全選択肢を間違いに固定した。体表解剖、生理学総論、血液、循環、呼吸、栄養と代謝、体温とその調節、神経、感覚の生理、尿の生成と排泄、内分泌、生殖、消化と吸収に紐付けた。"
    - "1999 question_1999_3.json は生理学、運動学、病理学概論、環境衛生。全問 true_false のまま、問60・66・69・73は『誤っている組合せ／みられない』の整理に合わせて select_incorrect に補正した。骨の生理、神経、筋肉の機能、感覚の生理、生殖、頭・頸部と四肢体幹の運動、歩行、姿勢、運動制御、循環障害、免疫異常、炎症、疾病の一般、病因、進行性病変、代謝障害、腫瘍、環境衛生に紐付けた。"
    - "1999 question_1999_4.json は公衆衛生と関係法規。問78・83・90・94は否定表現に合わせて select_incorrect に補正し、問92・100は a/b/c/d 組合せ比較のため group_choice に変更した。問100は 00_source の stem 欠落があり、外部参照で『施術所-6.6平方メートル以上の専用施術室』を補って explanation を記述し、診療放射線技師法・理学療法士及び作業療法士法の questionSetId も追加で使った。"

