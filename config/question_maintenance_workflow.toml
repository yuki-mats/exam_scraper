[system]
id = "question-maintenance-control-center"
name = "問題整備システム"
description = "正本ドキュメントと資格配下の実データを結び、次に必要な問題整備を進めるローカルGUI"
trunk_document = "document/operations/exam_pipeline_manual_and_automation.md"
human_documents = ["AGENTS.md", "prompt/README.md"]

[[session_groups]]
id = "maintenance"
label = "問題を整備"

[[session_groups]]
id = "law_audit"
label = "現行法を監査"

[[session_groups]]
id = "question_set"
label = "問題集を整備"

[[stages]]
id = "source"
code = "00"
label = "取得"
purpose = "出題時の問題文・選択肢・解答情報を保存する"
kind = "source"
documents = ["document/operations/scraping_workflow.md"]

[[stages]]
id = "setup"
code = "準備"
label = "資格方針"
purpose = "出題範囲・解説・法令確認の方針を固定する"
kind = "human"
documents = [
  "prompt/qualification_docs/README.md",
  "prompt/qualification_docs/_template/01_law_reference_policy.md",
]

[[stages]]
id = "originalize"
code = "05"
label = "独自問題化"
purpose = "取得問題の論点と試験らしさを保ち、公開用の問題文・選択肢・正答・必要画像を作る"
kind = "human"
# 2.4: 資格別の用語、設問の骨格、選択肢を優先して維持し、過剰なシナリオ化を避ける。
# 2.3: 問題文と選択肢の変更を必要最小限にし、難易度と問題品質を維持する。
# 2.2: 選択肢の書き換えを一律必須にせず、独自化した問題文との整合で判断する。
# 2.5: 問題文を維持して選択肢だけを変更・並べ替える独自化とAWS公式翻訳文体を許可する。
# 2.6: 問題文と選択肢は微修正にとどめ、正答と各選択肢の意味を維持する。
# 2.7: 既存草案も00_sourceと比較し、過剰な改変は元の情報と流れを保つ微修正へ整え直す。
policy_version = "2.7"
qualification_document_patterns = [
  "README.md",
  "01_exam_profile.md",
  "aws_official_japanese_sample_questions.md",
]
batch_selectable = true
automatic = false
session_group = "maintenance"
patch_dir = "05_originalized"
patch_suffix = "originalized"
issue_fields = [
  "questionBodyText",
  "choiceTextList",
  "correctChoiceText",
  "questionIntent",
  "answer_result_text",
  "questionImageStorageUrls",
  "originalQuestionChoiceImageUrls",
]
documents = [
  "prompt/05_prompt_originalize_question.md",
  "document/operations/original_question_authoring_workflow.md",
]

[[stages.update_targets]]
id = "content"
label = "問題文・選択肢・正答"
fields = ["questionBodyText", "choiceTextList", "correctChoiceText", "questionIntent", "answer_result_text"]

[[stages.update_targets]]
id = "images"
label = "問題画像"
fields = ["questionImageStorageUrls", "originalQuestionChoiceImageUrls"]
read_fields = ["questionBodyText", "choiceTextList"]

[[stages]]
id = "question_type"
code = "01"
label = "問題形式"
purpose = "回答体験に合うquestionTypeを一問ずつ確定する"
kind = "human"
# 5.0: 現在値や正答数を根拠にせず、回答体験から三形式を同列に独立判定するため洗い替える。
# 4.0: 複数選択問題をgroup_choiceではなく選択肢別true_falseとして再判定するため洗い替える。
# 3.0: 全問題を二重read-onlyレビューした後にserver合意を作り、通常候補を生成するため洗い替える。
# 2.0: isCalculationQuestionを既存問題にも再判定するため洗い替える。
# 洗い替え不要の改訂はMINOR、必要な改訂はMAJORを上げる。
policy_version = "5.0"
qualification_document_patterns = ["README.md", "01_exam_profile.md"]
batch_selectable = true
session_group = "maintenance"
patch_dir = "10_questionType_fixed"
patch_suffix = "questionType_fixed"
issue_fields = ["questionType", "isCalculationQuestion"]
documents = ["prompt/01_prompt_fix_questionType.md"]
agent_policy = { independent_review = { model = "gpt-5.5", reasoning_effort = "high" } }

[[stages.update_targets]]
id = "question_type"
label = "問題形式"
fields = ["questionType"]

[[stages.update_targets]]
id = "calculation_flag"
label = "計算問題フラグ"
fields = ["isCalculationQuestion"]
read_fields = ["questionType", "questionBodyText", "choiceTextList"]

[[stages]]
id = "question_intent"
code = "02"
label = "設問意図"
purpose = "正しいもの・誤っているもののどちらを選ぶ設問か確定する"
kind = "human"
# 2.0: 現在値や正答から補完せず、設問が求める方向だけを独立判定する。
policy_version = "2.0"
qualification_document_patterns = ["README.md", "01_exam_profile.md"]
batch_selectable = true
session_group = "maintenance"
patch_dir = "15_correctChoiceText_fixed"
patch_suffix = "correctChoiceText_fixed"
issue_fields = ["questionIntent"]
documents = ["prompt/02_prompt_fix_questionIntent.md"]

[[stages.update_targets]]
id = "intent"
label = "設問意図"
fields = ["questionIntent"]
read_fields = ["questionBodyText", "choiceTextList", "correctChoiceText", "answer_result_text"]

[[stages]]
id = "correct_choice"
code = "02a"
label = "正答精査"
purpose = "設問・公式解答・全選択肢を一問ずつ照合し正誤を確定する"
kind = "human"
# 2.0: questionTypeやquestionIntentから生成せず、根拠から各選択肢の正誤を独立判定する。
policy_version = "2.0"
qualification_document_patterns = ["README.md", "01_exam_profile.md"]
batch_selectable = true
session_group = "maintenance"
patch_dir = "23_correctChoiceText_fixed"
patch_suffix = "correctChoiceText_fixed"
issue_fields = ["correctChoiceText"]
documents = ["prompt/02a_prompt_review_correctChoiceText.md"]

[[stages.update_targets]]
id = "correct_answer"
label = "正答"
fields = ["correctChoiceText"]
read_fields = ["questionBodyText", "choiceTextList", "questionIntent", "answer_result_text"]

[[stages]]
id = "law_context"
code = "02b"
label = "法令根拠"
purpose = "法令関連性と現行法の根拠候補を全問で整理する"
kind = "human"
policy_version = "1.1"
qualification_document_patterns = [
  "README.md",
  "01_exam_profile.md",
  "*law_reference*.md",
]
batch_selectable = true
session_group = "maintenance"
patch_dir = "18_law_context_prepared"
patch_suffix = "lawContext_prepared"
issue_fields = ["isLawRelated", "lawGroundedExplanationNotNeeded", "lawReferences"]
documents = ["prompt/02b_prompt_prepare_law_context.md"]

[[stages.update_targets]]
id = "law_classification"
label = "法令関連性"
fields = ["isLawRelated", "lawGroundedExplanationNotNeeded"]
read_fields = ["questionBodyText", "choiceTextList"]

[[stages.update_targets]]
id = "law_grounding"
label = "法令根拠候補"
fields = ["lawReferences", "lawContextForExplanation"]
read_fields = ["isLawRelated", "questionBodyText", "choiceTextList", "correctChoiceText"]

[[stages]]
id = "explanation"
code = "03"
label = "解説"
purpose = "正誤理由を整え、追加の学習価値がある場合だけ補足質問を作る"
kind = "human"
# 4.0: 基本解説の言い換え補足を不適合とし、追加価値がなければ0件へ洗い替える。
# 4.1: 解説で確認したオンラインの公式一次資料を共通契約で紐づける。
# 4.2: 独自問題では元解説を参照し、既存の解説方針でより良く再構成する。
policy_version = "4.2"
qualification_document_patterns = [
  "README.md",
  "01_exam_profile.md",
  "02_explanation_strategy.md",
  "*law_reference*.md",
]
batch_selectable = true
session_group = "maintenance"
patch_dir = "21_explanationText_added"
patch_suffix = "explanationText_added"
issue_fields = ["explanationText", "explanationReferences", "suggestedQuestionDetailsByChoice"]
documents = ["prompt/03_prompt_add_explanationText.md"]

[[stages.update_targets]]
id = "basic_explanation"
label = "基本解説"
fields = ["explanationText", "explanationReferences"]
read_fields = ["questionBodyText", "choiceTextList", "correctChoiceText", "questionType", "isCalculationQuestion", "isLawRelated", "lawReferences", "lawContextForExplanation"]

[[stages.update_targets]]
id = "supplementary_questions"
label = "補足質問と回答"
fields = ["suggestedQuestionDetailsByChoice"]
read_fields = ["explanationText", "questionBodyText", "choiceTextList", "correctChoiceText", "questionType", "isCalculationQuestion"]

[[stages.update_targets]]
id = "law_support"
label = "解説用の法令情報"
fields = ["isLawRelated", "lawGroundedExplanationNotNeeded", "lawReferences", "lawContextForExplanation", "lawRevisionFacts"]
read_fields = ["questionBodyText", "choiceTextList", "correctChoiceText"]

[[stages]]
id = "law_audit"
code = "03b"
label = "現行法監査"
purpose = "条文根拠を一問一肢ずつ照合し現行法判定を固定する"
kind = "human"
# 4.0: 現行法監査でも基本解説との重複補足を除き、追加価値がなければ0件へ洗い替える。
policy_version = "4.0"
qualification_document_patterns = [
  "README.md",
  "01_exam_profile.md",
  "*law_reference*.md",
]
batch_selectable = true
session_group = "law_audit"
issue_fields = [
  "lawReferences",
  "lawRevisionFacts",
  "explanationText",
  "suggestedQuestionDetailsByChoice",
]
documents = [
  "prompt/03b_prompt_audit_current_law_and_patch.md",
  "document/operations/current_law_question_maintenance_workflow.md",
]

[[stages.update_targets]]
id = "law_audit"
label = "現行法監査一式"
fields = [
  "auditStatus",
  "reviewState",
  "sourceSummary",
  "verificationSummary",
  "reconciliationStatus",
  "primaryAuditRunId",
  "secondaryAuditRunId",
  "tertiaryAuditRunId",
  "auditInputHash",
  "evidenceBindingHash",
  "lawRevisionFacts",
  "lawReferences",
  "isLawRelated",
  "lawGroundedExplanationNotNeeded",
  "lawContextForExplanation",
  "correctChoiceText",
  "answer_result_text",
  "explanationText",
  "suggestedQuestionDetailsByChoice",
  "holdReason",
  "reviewNotes",
  "evidenceSummary",
  "examTimeDecision",
  "currentLawDecision",
]
read_fields = ["questionBodyText", "choiceTextList", "questionIntent"]

[[stages]]
id = "category_setup"
code = "03c"
label = "カテゴリ設計"
purpose = "資格全体の公式・専門家taxonomyをcategory.jsonとして確定する"
kind = "human"
policy_version = "1.0"
batch_selectable = true
session_group = "question_set"
scope = "qualification"
documents = [
  "prompt/03c_prompt_prepare_category_json.md",
  "prompt/qualification_docs/category_taxonomy_policy.md",
  "prompt/qualification_docs/shared_taxonomy_mapping_policy.md",
]

[[stages]]
id = "question_set"
code = "04"
label = "問題集"
purpose = "category方針に沿って問題集へ意味的に紐付ける"
kind = "human"
# 2.0: 問題文と全選択肢、category.json、資格別正本から再判定し、複数候補を強制割当せずholdするため洗い替える。
policy_version = "2.0"
qualification_document_patterns = [
  "README.md",
  "01_exam_profile.md",
  "03_category_preparation.md",
]
batch_selectable = true
session_group = "question_set"
patch_dir = "22_questionSetId_linked"
patch_suffix = "questionSetId_linked"
issue_fields = ["questionSetId"]
documents = ["prompt/04_prompt_link_questionSetId.md"]

[[stages.update_targets]]
id = "question_set"
label = "問題集割当"
fields = ["questionSetId"]
read_fields = [
  "questionBodyText",
  "choiceTextList",
  "questionSetIdList",
  "choiceQuestionSetIds",
]

[[stages]]
id = "delivery"
code = "出力"
label = "公開準備"
purpose = "patchをmerge・convertしupload-readyを検証する"
kind = "machine"
scope = "group"
documents = [
  "document/operations/delivery_workflow.md",
  "tools/question_bank/README.md",
]

[evaluation]
policy_version = "2.0"
documents = ["document/operations/local_question_review_console.md"]
inputs = [
  "tools/question_review_console/evaluation.py",
  "tools/question_review_console/evaluation_result.schema.json",
]
